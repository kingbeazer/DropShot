name: iOS TestFlight

on:
  workflow_dispatch:
    inputs:
      release_notes:
        description: "What to test (shown in TestFlight)"
        required: false
        default: "Internal build"

permissions:
  contents: read

concurrency:
  group: ios-testflight
  cancel-in-progress: false

jobs:
  build-upload:
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode (pin to MAUI-9-compatible version)
        run: |
          # MAUI 9 iOS workload ships iOS 18.0 SDK pack. Xcode 16.4 (default on
          # macos-15) ships iOS 18.4 SDK, which silently breaks actool. Pin to
          # the lowest available 16.x (16.0-16.3); avoid 16.4+.
          XCODE=""
          for v in "16.1" "16.2" "16.1.0" "16.2.0" "16.0" "16.0.0" "16.3" "16.3.0"; do
            if [ -d "/Applications/Xcode_${v}.app" ]; then
              XCODE="/Applications/Xcode_${v}.app"
              break
            fi
          done
          if [ -z "$XCODE" ]; then
            echo "No compatible Xcode (16.0-16.3) found. Available:"
            ls -d /Applications/Xcode_*.app 2>/dev/null
            exit 1
          fi
          sudo xcode-select -s "$XCODE"
          xcodebuild -version

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: DropShot.Maui/global.json

      - name: Pin SDK at repo root
        run: cp DropShot.Maui/global.json global.json

      - name: Install MAUI workload
        run: dotnet workload install maui

      - name: Compute build number
        id: bn
        run: echo "build_number=$((100 + ${{ github.run_number }}))" >> "$GITHUB_OUTPUT"

      - name: Import signing certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.IOS_DIST_CERT_P12_BASE64 }}
          p12-password: ${{ secrets.IOS_DIST_CERT_PASSWORD }}

      - name: Install provisioning profile
        env:
          PROFILE_B64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROFILE_B64" | base64 --decode \
            > ~/Library/MobileDevice/Provisioning\ Profiles/dropshot_appstore.mobileprovision

      - name: Extract profile metadata
        id: profile
        run: |
          PROFILE=~/Library/MobileDevice/Provisioning\ Profiles/dropshot_appstore.mobileprovision
          NAME=$(security cms -D -i "$PROFILE" | plutil -extract Name raw -)
          UUID=$(security cms -D -i "$PROFILE" | plutil -extract UUID raw -)
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "uuid=$UUID" >> "$GITHUB_OUTPUT"

      - name: Restore (iOS only)
        run: dotnet restore DropShot.Maui/DropShot.Maui.csproj -p:TargetFramework=net9.0-ios18.0

      - name: Publish IPA
        run: |
          dotnet publish DropShot.Maui/DropShot.Maui.csproj \
            -f net9.0-ios18.0 \
            -c Release \
            -p:RuntimeIdentifier=ios-arm64 \
            -p:ArchiveOnBuild=true \
            -p:OptimizePNGs=false \
            -p:CodesignKey="${{ secrets.IOS_CODESIGN_KEY }}" \
            -p:CodesignProvision="${{ steps.profile.outputs.name }}" \
            -p:ApplicationVersion=${{ steps.bn.outputs.build_number }} \
            -p:ApplicationDisplayVersion=1.0

      - name: Dump actool diagnostics on failure
        if: failure()
        run: |
          echo "=== actool dir contents ==="
          ls -la DropShot.Maui/obj/Release/net9.0-ios18.0/ios-arm64/actool/ 2>/dev/null || echo "(no actool dir)"
          echo
          echo "=== asset-manifest.plist ==="
          cat DropShot.Maui/obj/Release/net9.0-ios18.0/ios-arm64/actool/asset-manifest.plist 2>/dev/null || echo "(missing)"
          echo
          echo "=== actool log files ==="
          find DropShot.Maui/obj/Release/net9.0-ios18.0/ios-arm64/actool/ -type f -name "*.log" -exec sh -c 'echo "--- {} ---"; cat "{}"' \; 2>/dev/null || true
          echo
          echo "=== Xcode + actool version ==="
          xcode-select -p
          xcrun actool --version 2>&1 || true
          echo
          echo "=== Resources/AppIcon contents ==="
          ls -la DropShot.Maui/Resources/AppIcon/

      - name: Locate IPA
        id: ipa
        run: |
          IPA=$(find DropShot.Maui/bin/Release/net9.0-ios18.0 -name "*.ipa" | head -n 1)
          test -n "$IPA" || { echo "No IPA produced"; exit 1; }
          echo "path=$IPA" >> "$GITHUB_OUTPUT"

      - name: Upload to TestFlight
        uses: apple-actions/upload-testflight-build@v3
        with:
          app-path: ${{ steps.ipa.outputs.path }}
          issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ secrets.APPSTORE_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_PRIVATE_KEY }}

      - name: Upload IPA + dSYMs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: DropShot-ios-${{ steps.bn.outputs.build_number }}
          path: |
            DropShot.Maui/bin/Release/net9.0-ios18.0/ios-arm64/publish/*.ipa
            DropShot.Maui/bin/Release/net9.0-ios18.0/ios-arm64/**/*.dSYM/**
          retention-days: 14
